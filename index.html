  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; background:#1a2e4a; overflow:hidden; }
    #splash {
      position:fixed; inset:0; background:#1a2e4a;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:24px;
    }
    .logo-box {
      width:150px; height:150px; border-radius:24px;
      background:#fff; display:flex; align-items:center;
      justify-content:center; padding:16px;
      box-shadow:0 8px 32px rgba(0,0,0,0.4);
    }
    .logo-box img { width:100%; height:100%; object-fit:contain; }
    .app-name { color:#fff; font-family:sans-serif; font-size:22px;
                 font-weight:700; letter-spacing:2px; }
    #splash p { color:rgba(255,255,255,0.6); font-family:sans-serif;
                  font-size:13px; }
    .spinner {
      width:36px; height:36px;
      border:3px solid rgba(255,255,255,.25); border-top-color:#fff;
      border-radius:50%; animation:spin .8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>

    <div class="spinner"></div>
    <p>Cargando aplicación...</p>
  </div>

  <script>
    // Registrar Service Worker (actualiza el viejo automáticamente)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(function(reg) {
          // Forzar actualización inmediata si hay uno en espera
          if (reg.waiting) reg.waiting.postMessage({type:'SKIP_WAITING'});
          reg.addEventListener('updatefound', function() {
            var nw = reg.installing;
            if (nw) nw.addEventListener('statechange', function() {
              if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                nw.postMessage({type:'SKIP_WAITING'});
              }
            });
          });
        })
        .catch(function(e){ console.warn('SW:', e); });
    }

    // Redirigir directamente a la app GAS (sin iframe)
    // window.location.replace no deja historial → botón Atrás no vuelve al splash
    setTimeout(function() {
      window.location.replace('https://script.google.com/macros/s/AKfycbwqJaFj8O6LkG2AyhSyL08KlmCXu-W1h8LtGdHEZioXPJR_eg1nHuxH2EQ5dpDj2c6B/exec');
    }, 1500);
  </script>
</body>
