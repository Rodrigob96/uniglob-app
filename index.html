  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a2e4a; }
    #splash {
      position: fixed; inset: 0; background: #1a2e4a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; z-index: 10; transition: opacity 0.5s ease;
    }
    #splash img { width: 140px; height: 140px; border-radius: 20px;
                  background:#fff; padding:12px; object-fit:contain; }
    #splash p { color:#fff; font-family:sans-serif; font-size:14px; opacity:.7; }
    .spinner { width:36px; height:36px;
      border:3px solid rgba(255,255,255,.3); border-top-color:#fff;
      border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    iframe { position:fixed; inset:0; width:100%; height:100%; border:none; }
  </style>
